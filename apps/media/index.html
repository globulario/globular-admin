<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Globular Media" />
  <title>Globular Media</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/img/logo.png" />
</head>

<body>
  <globular-app-layout application-name="Globular Media">

    <globular-sidebar slot="app-side-menu" header-title="Globular" header-subtitle="© 2025 Globular Project">
      <img slot="header-logo" src="./img/logo.png" alt="Globular logo" style="width:42px;height:42px;object-fit:contain;border-radius:50%;" />
      <globular-sidebar-menu>
        <globular-sidebar-menu-item text="Watching" route="#/media/watching"></globular-sidebar-menu-item>
        <globular-sidebar-menu-item text="Settings" route="#/media/settings"></globular-sidebar-menu-item>
        <globular-sidebar-menu-item text="About"    route="#/media/about"></globular-sidebar-menu-item>
      </globular-sidebar-menu>
    </globular-sidebar>

    <globular-search-bar slot="contextual-action-bar" style="flex:1;min-width:200px;max-width:600px;"></globular-search-bar>
    <file-explorer-btn slot="contextual-action-bar"></file-explorer-btn>
    <div slot="contextual-action-bar" style="flex:1;"></div>
    <user-toolbar slot="contextual-action-bar" logout-redirect="#/login" visibility="authenticated"></user-toolbar>
    <theme-toggle slot="contextual-action-bar"></theme-toggle>

    <div slot="app-content" id="app"></div>
  </globular-app-layout>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
