<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globular Media</title>
</head>

<body>
  <globular-app-layout application-name="Globular Media">

    <globular-sidebar slot="app-side-menu" header-title="Globular" header-subtitle="© 2025 Globular Project">

      <globular-sidebar-menu>
        <globular-sidebar-menu-item text="Search"   route="#/media/search"></globular-sidebar-menu-item>
        <globular-sidebar-menu-item text="Watching" route="#/media/watching"></globular-sidebar-menu-item>
        <globular-sidebar-menu-item text="Settings" route="#/media/settings"></globular-sidebar-menu-item>
      </globular-sidebar-menu>
    </globular-sidebar>

    <div slot="app-logo" style="display:flex;align-items:center;padding-left:8px;">

    </div>
    <div slot="app-title">
      <h3 style="margin:0;padding-left:8px;">Globular Media</h3>
    </div>

    <user-toolbar slot="contextual-action-bar"></user-toolbar>
    <theme-toggle slot="contextual-action-bar"></theme-toggle>

    <div slot="app-content" id="app"></div>
  </globular-app-layout>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
