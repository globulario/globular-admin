<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globular Admin</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/img/logo.png" />
</head>

<body>
  <globular-app-layout application-name="Globular Admin">

    <globular-sidebar slot="app-side-menu" header-title="Globular" header-subtitle="© 2025 Globular Project">

      <globular-sidebar-menu>

        <globular-sidebar-menu-item text="Overview" route="#/dashboard"></globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Cluster">
          <globular-sidebar-menu-item text="Nodes"          route="#/cluster/nodes"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Reconciliation" route="#/cluster/reconciliation"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Join Requests"  route="#/cluster/join"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Topology"       route="#/cluster/topology"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Services">
          <globular-sidebar-menu-item text="Instances" route="#/services/instances"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Catalog"   route="#/services/catalog"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Security">
          <globular-sidebar-menu-item text="Certificates" route="#/security/certificates"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Secrets"      route="#/security/secrets"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="CORS"         route="#/security/cors"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="RBAC">
            <globular-sidebar-menu-item text="Accounts"      route="#/security/rbac/accounts"></globular-sidebar-menu-item>
            <globular-sidebar-menu-item text="Organizations" route="#/security/rbac/organizations"></globular-sidebar-menu-item>
            <globular-sidebar-menu-item text="Groups"        route="#/security/rbac/groups"></globular-sidebar-menu-item>
            <globular-sidebar-menu-item text="Roles"         route="#/security/rbac/roles"></globular-sidebar-menu-item>
          </globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Infrastructure">
          <globular-sidebar-menu-item text="Storage" route="#/infrastructure/storage"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="DNS"     route="#/infrastructure/dns"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Observability">
          <globular-sidebar-menu-item text="Metrics" route="#/observability/metrics"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Logs"    route="#/observability/logs"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Events"  route="#/observability/events"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Repository" route="#/repository"></globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Admin Tools">
          <globular-sidebar-menu-item text="Diagnostics" route="#/admin/diagnostics"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Upgrades"    route="#/admin/upgrades"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Backups"     route="#/admin/backups"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

      </globular-sidebar-menu>
    </globular-sidebar>

    <div slot="app-logo" style="display:flex;align-items:center;padding-left:8px;">
    </div>
    <div slot="app-title">
      <h3 style="margin:0;padding-left:8px;">Globular Admin</h3>
    </div>

    <user-toolbar slot="contextual-action-bar"></user-toolbar>
    <theme-toggle slot="contextual-action-bar"></theme-toggle>

    <div slot="app-content" id="app"></div>
  </globular-app-layout>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
