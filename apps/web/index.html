<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globular Admin</title>
</head>

<body>
  <globular-app-layout application-name="Globular Admin">

    <globular-sidebar slot="app-side-menu" header-title="Globular" header-subtitle="© 2025 Globular Project">

      <globular-sidebar-menu>
        <globular-sidebar-menu-item text="Dashboard" route="#/dashboard"></globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Cluster">
          <globular-sidebar-menu-item text="Nodes" route="#/cluster/nodes"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Join Requests" route="#/cluster/join"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Topology" route="#/cluster/topology"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Services">
          <globular-sidebar-menu-item text="Catalog" route="#/services/catalog"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Instances" route="#/services/instances"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Networking">
          <globular-sidebar-menu-item text="DNS" route="#/networking/dns"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Gateway (Envoy)" route="#/networking/gateway"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Certificates" route="#/networking/certificates"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Storage">
          <globular-sidebar-menu-item text="Volumes" route="#/storage/volumes"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="MinIO" route="#/storage/minio"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="ScyllaDB" route="#/storage/scylla"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="etcd" route="#/storage/etcd"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Security">
          <globular-sidebar-menu-item text="Policies" route="#/security/policies"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Secrets" route="#/security/secrets"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="RBAC">
          <globular-sidebar-menu-item text="Accounts" route="#/rbac/accounts"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Organizations" route="#/rbac/organizations"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Groups" route="#/rbac/groups"></globular-sidebar-menu-item>
          <globular-sidebar-menu-item text="Roles" route="#/rbac/roles"></globular-sidebar-menu-item>
        </globular-sidebar-menu-item>

        <globular-sidebar-menu-item text="Repository" route="#/repository"></globular-sidebar-menu-item>
      </globular-sidebar-menu>
    </globular-sidebar>

    <div slot="app-logo" style="display:flex;align-items:center;padding-left:8px;">

    </div>
    <div slot="app-title">
      <h3 style="margin:0;padding-left:8px;">Globular Admin</h3>
    </div>

    <user-toolbar slot="contextual-action-bar"></user-toolbar>
    <theme-toggle slot="contextual-action-bar"></theme-toggle>

    <div slot="app-content" id="app"></div>
  </globular-app-layout>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
