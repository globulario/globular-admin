# invariants.yaml — globular-admin
#
# Laws the admin UI must uphold. An AI agent editing any frontend component
# must not introduce a change that violates these invariants.
#
# Confidence levels: very_high (incident-proven) | high (principle/test) | medium (inferred)

invariants:

    - id: ui.state_authority_binding
      title: Every visible state must be bound to the correct authority layer
      severity: critical
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          Every badge, status indicator, action button, and progress element in the
          admin UI must derive its displayed value from the correct authority layer.
          The 4-layer model applies: desired ≠ installed ≠ running ≠ healthy.
          A component that renders service status must bind to a runtime health probe,
          not to the desired-state record. A workflow-progress indicator must bind to
          the workflow terminal state, not to the dispatch RPC return code.
      enforcement: |
          Before editing any component that renders cluster state, check authority_rules.yaml
          to confirm the data source is correct for the displayed value.
      forbidden_fixes:
          - forbidden.render_desired_as_running
          - forbidden.render_dispatch_as_complete
          - forbidden.derive_runtime_from_desired

    - id: ui.unknown_state_must_not_appear_healthy
      title: Unknown or unreachable state must render as unknown, not healthy
      severity: critical
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          When a health probe times out, an inventory record is absent, or a node is
          unreachable, the UI must show "unknown" or "unreachable" — never "healthy" or "ok".
          Defaulting unknown to healthy hides real outages from operators.
      enforcement: |
          Any component that renders a status badge or health indicator must have an
          explicit branch for the absent/timeout/error case that shows a distinct
          non-green state. The "no data = healthy" pattern is forbidden.
      forbidden_fixes:
          - forbidden.unknown_as_healthy

    - id: ui.destructive_action_requires_explicit_confirmation
      title: Destructive or irreversible actions must require explicit operator confirmation
      severity: critical
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          Actions that are hard or impossible to reverse — node removal, service deletion,
          RBAC role deletion, artifact deletion, objectstore topology reset — must present
          an explicit confirmation step before dispatching the mutating RPC.
          The confirmation must name the resource being mutated and the consequence.
          A single-click "Delete" button with no confirmation dialog is a violation.
      enforcement: |
          Before adding or editing a delete/remove/wipe/reset action in the UI, verify
          there is a confirmation dialog that (a) names the resource, (b) describes the
          consequence, and (c) requires an affirmative non-default action (not just OK).
      forbidden_fixes:
          - forbidden.single_click_destructive_mutation

    - id: ui.token_storage_sessionStorage_only
      title: Auth tokens must be stored in sessionStorage, never localStorage or DOM
      severity: critical
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          The JWT auth token must be stored in sessionStorage (cleared on tab close),
          never in localStorage (persists across sessions) or in DOM attributes / JS globals.
          Persisting tokens in localStorage makes them available to XSS and across
          unrelated sessions — violating the ephemeral token contract.
          Current implementation: sessionStorage key __globular_token__.
      enforcement: |
          Any change to auth token storage must keep the token in sessionStorage only.
          Do not migrate to localStorage. Do not embed tokens in URL fragments or custom headers
          that are logged. Do not store tokens in any module-level variable that survives
          across page navigations.
      forbidden_fixes:
          - forbidden.token_in_localStorage
          - forbidden.token_in_dom

    - id: ui.rbac_is_server_enforced_not_ui
      title: RBAC enforcement is server-side; UI may hide but must not gate security on visibility
      severity: high
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          The admin UI hides action buttons for users who lack permission. This is a UX
          convenience only — it is not a security boundary. The server enforces RBAC on
          every RPC via the interceptor chain.
          An AI agent must not add client-side permission checks as the sole security gate
          for a sensitive action. If a button is hidden, the underlying RPC endpoint must
          still enforce authorization independently.
      enforcement: |
          Never add "if userHasRole(X) then allow" logic as the only guard for a sensitive
          operation. UI visibility gates are supplemental only.

    - id: ui.super_admin_detection_is_display_only
      title: Super-admin detection via username === 'sa' is a display hint, not an auth gate
      severity: high
      status: active
      # origin: { type: inferred_from_code, confidence: high }
      summary: |
          The SDK detects super-admin by checking if the parsed token's username equals 'sa'.
          This is used to show or hide admin-only UI sections — it is NOT a security check.
          Server-side RBAC enforces what 'sa' can actually do. An AI agent must not elevate
          this client-side check into an authorization gate or rely on it for security decisions.
      enforcement: |
          Do not add business logic that grants additional permissions based on username === 'sa'.
          Display-only visibility changes are acceptable; auth gates are not.

    - id: ui.workflow_completion_requires_terminal_state_poll
      title: Workflow success must be confirmed by polling for terminal state, not from dispatch
      severity: high
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          When the UI dispatches a cluster mutation (service deploy, node join approval,
          topology apply, package install), the dispatch RPC returning 200 does NOT mean the
          operation completed. The workflow may still be running, blocked, or about to fail.
          The UI must poll WorkflowService for SUCCEEDED or FAILED before showing a success
          state. Showing "Done ✓" immediately after dispatch is a violation.
      enforcement: |
          Any mutation flow that results in a workflow must include a polling/streaming step
          that waits for terminal state before presenting success to the operator.
      forbidden_fixes:
          - forbidden.render_dispatch_as_complete

    - id: ui.join_approval_starts_workflow_not_completes_join
      title: Approving a node join request starts a workflow — the node is not joined until convergence
      severity: high
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          Calling approveJoin(requestId, profiles) dispatches a join workflow.
          The node is NOT joined when the RPC returns. The operator UI must show the
          workflow progress (pending → converging → joined) and must not display the
          node as a cluster member until the join workflow reaches SUCCEEDED and the
          node's first heartbeat is observed.
      enforcement: |
          The join approval UI must present workflow-state feedback after the RPC call.
          The node list must not include the joining node until its heartbeat is confirmed.
      forbidden_fixes:
          - forbidden.render_dispatch_as_complete

    - id: ui.grpc_web_errors_must_surface_to_operator
      title: gRPC-web errors must be surfaced to the operator, not silently swallowed
      severity: high
      status: active
      # origin: { type: inferred_from_code, confidence: medium }
      summary: |
          The SDK auto-retries on auth expiry (one forced refresh + retry). After that,
          any RPC error must be presented to the operator — not silently dropped, not
          shown as "loading" indefinitely, not defaulted to empty/healthy state.
          Swallowing errors hides real cluster problems from operators.
      enforcement: |
          Every RPC call site must have an error branch that surfaces the error to the
          operator (toast, inline error, error state in component). An empty catch block
          or a catch that only logs to console is a violation.

    - id: ui.refresh_must_not_disrupt_view
      title: Data refresh must update in-place; full DOM replacement is forbidden on refresh
      severity: high
      status: active
      # origin: { type: incident, confidence: very_high }
      summary: |
          Auto-refresh and polling loops must patch existing DOM nodes with updated data.
          Calling this.innerHTML = … or this.render() on a timer wipes the operator's
          context — scroll position, selected rows, open detail panels, focus state —
          and causes a blank screen while data reloads. This was observed on the cluster
          nodes page causing >30 s of blank screen on every 30-second interval.

          Rules:
          1. The first render (connectedCallback / initial load) MAY build the full DOM.
          2. All subsequent refreshes MUST use targeted in-place DOM updates:
             - update only cells/elements whose data actually changed
             - add rows for new items, remove rows for gone items
             - never wipe and rebuild the whole component
          3. A persistent error slot (e.g. id="*-error-banner") must exist in the
             initial render so refresh failures can surface without a full re-render.
          4. Only components whose underlying data changed must be touched.
             Stable data (hostname, node ID, profiles) must not flicker.
      enforcement: |
          Before adding setInterval/setTimeout refresh to any page component, verify:
          (a) there is a _rendered / _initialised flag that gates the full render to first load only,
          (b) subsequent calls use a patch/diff method that updates only data cells,
          (c) user selection state (_selectedId) and open panels are preserved across refresh.
      forbidden_fixes:
          - forbidden.full_render_on_refresh

    - id: ui.view_data_separation
      title: View structure and data must be separated; data slots receive updates via events, never by rebuilding the view
      severity: high
      status: active
      # origin: { type: principle, confidence: very_high }
      summary: |
          Every component that displays backend data must separate the view (DOM structure)
          from the data layer (live values). This separation applies to the WHOLE application.

          The pattern:
          1. The view shell (skeleton HTML with named slots) is built ONCE — in connectedCallback
             or on first load. It never gets wiped.
          2. Data slots are identified by a `data-bind="<key>"` attribute. Each slot holds
             exactly one piece of live data (a cell value, a badge, a count).
          3. When new data arrives from the backend (poll result, RPC response, event), it is
             pushed into the slots by setting innerHTML / textContent on the matching
             [data-bind] element. The surrounding DOM structure is never touched.
          4. Old data REMAINS VISIBLE in its slot until new data explicitly replaces it.
             Resetting slots to a loading placeholder ("…") on every refresh cycle is a violation
             because it creates visible flicker and erases information the operator was reading.
          5. Structural changes (adding/removing rows for new/gone entities) are the only
             permitted reason to modify the table skeleton — and even then, pre-existing rows
             must be reused if the entity still exists.

          Forbidden patterns:
          - Rebuilding a list/table from scratch on every data refresh
          - Wiping slot content to a spinner/placeholder on each poll cycle
          - Using this.innerHTML = <template> inside a refresh/polling callback
          - Passing the full data object to a render() method from a timer

          Compliant pattern (example):
              // Push data into an existing slot
              const cell = tr.querySelector('[data-bind="reachable"]')
              if (cell) cell.innerHTML = newHtml
      enforcement: |
          Before adding any component that displays live backend data, verify:
          (a) the shell is built once and stored in a _shell / _built / _initialised flag,
          (b) data updates use querySelector('[data-bind="..."]').innerHTML = … (or equivalent),
          (c) old slot content is never explicitly reset to "…" or a spinner inside a refresh loop,
          (d) structural row adds/removes reuse existing row elements where the entity ID matches.

          Any component that renders backend state and calls this.innerHTML = … or
          this.render() inside a setInterval / polling callback is a violation.
      forbidden_fixes:
          - forbidden.full_render_on_refresh
          - forbidden.wipe_slot_on_refresh

    - id: ui.page_data_cache
      title: Pages that display live data must cache their last fetch and show it immediately on remount
      severity: high
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          Every page component that fetches remote data (cluster state, node lists, packages,
          workflow runs, metrics, etc.) must implement a stale-while-revalidate cache so that
          navigating back to a page shows data immediately — no blank screen, no loading spinner —
          while a background refresh brings in the latest values.

          The pattern (module-level cache + background refresh):

          ```typescript
          // Module-level — survives component unmount/remount from navigation
          interface _PageCache<T> { data: T | null; fetchedAt: number }
          const _cache: _PageCache<MyData[]> = { data: null, fetchedAt: 0 }

          class PageFoo extends HTMLElement {
            private _built = false
            private _data: MyData[] = []

            connectedCallback() {
              this._buildShell()
              // 1. Show cached data immediately (zero flicker on back-navigation)
              if (_cache.data !== null) {
                this._data = _cache.data
                this._pushData()
              }
              // 2. Always refresh in background regardless of cache state
              this._load()
              this._timer = setInterval(() => this._load(), 30_000)
            }

            async _load() {
              try {
                const fresh = await fetchData()
                this._data = fresh
                _cache.data = fresh          // update module-level cache
                _cache.fetchedAt = Date.now()
                this._showError('')
                this._pushData()             // push to data-bind slots
              } catch (e: any) {
                this._showError(e?.message || 'Load failed')
              }
            }
          }
          ```

          Rules:
          1. Cache is module-level (declared with `const _cache = ...` at file scope),
             NOT instance-level (`this._cache`). Instance-level caches are wiped on
             every navigation because the component is destroyed and recreated.
          2. On `connectedCallback`, check the cache first. If non-null, call `_pushData()`
             immediately with cached data before the first network round-trip.
          3. Always call `_load()` after pushing cached data — cached data is stale by
             definition; the background fetch brings in the latest.
          4. Do NOT show a loading spinner or blank slot when cached data is available.
             A subtle "↻ refreshing" indicator in the page header is acceptable.
          5. Cache must be populated on every successful fetch, not just the first one.
          6. On fetch error when cache is non-empty: keep showing cached data, surface
             the error in the error-banner slot (do not clear the data slots).

      enforcement: |
          Before adding a new page component that fetches remote data:
          (a) Declare `const _cache: { data: T | null; fetchedAt: number } = { data: null, fetchedAt: 0 }` at module scope.
          (b) In `connectedCallback`, push `_cache.data` to slots before calling `_load()`.
          (c) In `_load()`, write `_cache.data = fresh; _cache.fetchedAt = Date.now()` after
              a successful fetch.
          (d) Never show a loading spinner when `_cache.data !== null`.
      forbidden_fixes:
          - forbidden.instance_level_page_cache
          - forbidden.spinner_over_cached_data

    - id: ui.no_hardcoded_backend_addresses
      title: Backend addresses must come from localStorage config, not hardcoded
      severity: high
      status: active
      # origin: { type: principle, confidence: high }
      summary: |
          The Globular backend address is stored in localStorage (globular.baseUrl) and
          routing mode in localStorage (globular.routingMode). These values allow the
          admin UI to target different clusters without a rebuild.
          An AI agent must not hardcode a backend address (IP, hostname, or port) in the
          source code. If a component needs to call a backend, it must read the address
          from the SDK config layer.
      enforcement: |
          Any code that constructs a gRPC-web channel or HTTP URL to a Globular backend
          must use the SDK's config-resolved base URL, not a literal string.
      forbidden_fixes:
          - forbidden.hardcoded_backend_address

    - id: ui.no_blind_page_reload
      title: Pages must be built once; data updates must use targeted DOM mutations, never full rebuilds
      severity: critical
      status: active
      # origin: { type: principle, confidence: very_high }
      summary: |
          Every page component must build its DOM shell exactly once (in connectedCallback
          or first load). After that, ALL data updates — whether from polling timers, RPC
          responses, or async callbacks — must write to specific [data-bind] slots using
          targeted DOM mutations. Full page rebuilds (this.innerHTML = ... from a timer or
          RPC handler, calling render() from any async callback) are strictly forbidden.

          The correct pattern:
          1. Build shell once: `if (!this._built) { this._buildShell(); this._built = true }`
          2. Data arrives → push to slots: `el.innerHTML = newHtml` on `[data-bind="slot"]` elements
          3. Timer callbacks call `_pushData()` / `_silentLoad()`, never `render()`
          4. RPC response handlers call targeted patchers (`_patchRunView()`, `_pushDefs()`),
             never `this.render()` or `this.innerHTML = ...`

          Why: Full rebuilds destroy operator context (scroll position, selection, focus),
          cause visible flicker, reset interaction state, and make the UI feel unstable.
          A page that rebuilds every 30 seconds is unusable for active monitoring.
      enforcement: |
          Before adding any async callback (timer, RPC response, error handler) to a page,
          verify it does NOT call this.render() or assign to this.innerHTML.
          The only permitted caller of this.innerHTML = ... is _buildShell() / connectedCallback
          on first mount.
      forbidden_fixes:
          - forbidden.full_render_on_refresh
          - forbidden.wipe_slot_on_refresh

    # ── Structural invariants (component pattern) ─────────────────────────────

    - id: ui.component_shell_built_once
      title: Page components must build their DOM shell exactly once, guarded by a _built flag
      severity: high
      status: active
      # origin: { type: structural_audit, confidence: high }
      # evidence: 10 pages found missing _built guard during 2026-06-12 audit
      summary: |
          Every page component that renders backend data must follow this structure:
          1. Declare `private _built = false` on the class
          2. In connectedCallback(), call `_buildShell()` which checks `if (this._built) return`
          3. `_buildShell()` sets `this._built = true` then assigns `this.innerHTML` ONCE
          4. All subsequent updates call `_pushData()` or `_patchTabContent()` — targeted slot writes

          Exempt: thin wrappers delegating to widgets (rbac pages), static pages (login),
          and pages with no polling/refresh cycle.
      enforcement: |
          Before adding a new page component, verify it declares _built and _buildShell().
      forbidden_fixes:
          - forbidden.full_render_on_refresh

    - id: ui.component_timer_cleanup
      title: Components with setInterval must clean up in disconnectedCallback
      severity: high
      status: active
      # origin: { type: structural_audit, confidence: high }
      # evidence: 4 pages with timers but no disconnectedCallback found 2026-06-12
      summary: |
          Any component that creates a timer (setInterval or recurring setTimeout) MUST
          implement disconnectedCallback() to clear it. Failure to do so causes memory
          leaks, ghost fetches, and console errors from detached DOM operations.
      enforcement: |
          Before adding setInterval to a component, verify disconnectedCallback exists
          and clears the timer.

    - id: ui.module_level_cache_required
      title: Pages with live data must use module-level cache for stale-while-revalidate
      severity: high
      status: active
      # origin: { type: structural_audit, confidence: high }
      # evidence: 20 pages missing module-level cache found 2026-06-12
      summary: |
          Every page that fetches remote data must declare a module-level cache:
          `const _cache: { data: T | null; fetchedAt: number } = { data: null, fetchedAt: 0 }`
          This cache survives component destroy/recreate from navigation. On remount,
          push cached data to slots before calling _load(). Instance-level caches
          (this._cache) are destroyed on navigation — forbidden.
      enforcement: |
          Verify a module-level const _cache exists at file scope. Verify
          connectedCallback pushes _cache.data before _load().
      forbidden_fixes:
          - forbidden.instance_level_page_cache
          - forbidden.spinner_over_cached_data

    - id: ui.error_banner_slot_required
      title: Pages must have a persistent error slot for surfacing fetch failures
      severity: medium
      status: active
      # origin: { type: structural_audit, confidence: high }
      # evidence: 18 pages missing error banner slot found 2026-06-12
      summary: |
          Every page shell must include an error banner element (id="error-banner"
          or data-bind="error-area"). When a fetch fails, show the error in the
          banner slot and keep cached data visible. Never wipe data slots to show
          an error — use the dedicated error slot.
      enforcement: |
          Verify the shell HTML includes an error banner element and the _load()
          error handler writes to the error slot without clearing data slots.

    - id: ui.sdk_utilities_not_duplicated
      title: SDK proto helpers (getStr, getArr, newRq, pickMethod) must not be duplicated
      severity: medium
      status: active
      # origin: { type: code_audit, confidence: high }
      # evidence: 6 SDK rbac files had identical copies of 4 functions (fixed commit bb71f17)
      summary: |
          The SDK rbac/ modules share identical utility functions for proto message
          access. These must be defined once in a shared module and imported.
          Duplicated utilities cause inconsistent behavior and missed bug fixes.
      enforcement: |
          Import from packages/sdk/src/rbac/proto_helpers.ts. Do not define local copies.

    - id: ui.interactive_element_must_have_stable_identity
      title: Every interactive or data-driven DOM element must have a stable, unique identifier
      severity: high
      status: active
      # origin: { type: visual_audit, confidence: high }
      # evidence: anonymous spans in incidents page filter pills discovered via screenshot 2026-06-12
      summary: |
          Every DOM element that is:
          (a) clickable / interactive (buttons, pills, tabs, links),
          (b) a data slot that receives updates (badges, counts, status indicators), or
          (c) a container whose content is replaced by _pushData / _set

          MUST have a stable identifier via one of:
          - `id="unique-name"` — for singleton elements (one per page)
          - `data-bind="slot-name"` — for data slots targeted by _set()
          - `data-filter="N"` / `data-action="X"` — for event-delegated interactive elements
          - `data-id="entity-id"` — for list items bound to a backend entity

          Why:
          1. Testability — automated tests and screenshot-based audits need stable selectors
          2. Debuggability — DevTools inspection requires named anchors
          3. Accessibility — screen readers need labeled elements
          4. AWG enforcement — structural audits can verify element identity via DOM queries
          5. Identity principle — every element that carries operational meaning must be
             individually addressable, not anonymous

          Anonymous `<span>` elements with inline styles are particularly dangerous because:
          - They can't be targeted by CSS-only theme overrides
          - They can't be tested without fragile nth-child selectors
          - They carry no semantic signal to assistive technology

          The identity must be STABLE across renders — it must not change when data changes.
          Use the entity's domain ID (incident ID, node ID, service name) as the basis
          for data-id, not array indices or generated UUIDs.
      enforcement: |
          Before adding an interactive or data-driven element, assign it one of:
          id, data-bind, data-action, data-filter, or data-id.
          Anonymous styled spans that carry operational meaning are a violation.

    - id: ui.filter_counts_must_reflect_total_not_filtered
      title: Filter pill counts must show totals across the full dataset, not the filtered subset
      severity: high
      status: active
      # origin: { type: visual_audit_incident, confidence: very_high }
      # evidence: cluster_incidents.ts showed RESOLVED 0 when 13 existed (fixed commit 1d1fa3d)
      summary: |
          When a page displays filter pills (e.g., All / OPEN / RESOLVED / ACKED),
          the count shown on each pill must reflect the TOTAL number of items in that
          status across the entire dataset — not just the items visible in the current
          filter view.

          Showing filtered counts creates a false impression:
          - "RESOLVED 0" when 13 incidents are actually resolved but hidden by the OPEN filter
          - "All 3" when the total is actually 16 but only OPEN incidents were fetched

          The correct pattern:
          1. Always fetch the full dataset (status=0 / no filter) from the backend
          2. Compute pill counts from the full dataset
          3. Apply the filter client-side for display
          4. Clicking a filter pill re-applies the filter without re-fetching
      enforcement: |
          Pill count variables must be computed from _allItems (unfiltered),
          not _items (filtered). The _load() method must fetch with status=0.
