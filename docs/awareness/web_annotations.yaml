# web_annotations.yaml — globular-admin
#
# Maps apps/web/src/ files to the invariants they enforce or protect.
# Used by AWG to answer briefing/impact queries for frontend changes.

# ── Core files ────────────────────────────────────────────────────────────────

core_files:

  - file: apps/web/src/router.ts
    enforces:
      - ui.token_storage_sessionStorage_only
      - ui.no_hardcoded_backend_addresses
    notes: |
      SPA router. Auth gate via hasToken() reads from sessionStorage.
      isSuperAdmin() checks username==='sa' — display-only, not a security gate.
      All routes are hash-based (#/...), no backend URLs in routing.

  - file: apps/web/src/main.ts
    notes: |
      Entry point. Initializes UI framework and starts router. No invariant surface.

  - file: apps/web/src/utils/confirm_dialog.ts
    enforces:
      - ui.destructive_action_requires_explicit_confirmation
    notes: |
      Shared confirmation dialog. Used by pages/widgets for destructive actions.
      Non-default confirm button (Cancel is default via focus management).

  - file: apps/web/src/utils/infra_health.ts
    enforces:
      - ui.unknown_state_must_not_appear_healthy
      - ui.state_authority_binding
    notes: |
      Shared health model. HealthState includes 'unknown' as explicit state.
      stateColor('unknown') returns grey, never green. mergeStatuses() treats
      unknown as worse than healthy.

